<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Background Circle with Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="checkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#48bb78;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38a169;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main Background -->
  <rect width="64" height="64" rx="14" fill="url(#bgGradient)"/>
  
  <!-- Checklist Icon -->
  <!-- Top Task Line -->
  <rect x="14" y="16" width="20" height="3" rx="1.5" fill="white" opacity="0.9"/>
  <circle cx="38" cy="17.5" r="4" fill="url(#checkGradient)"/>
  <path d="M36.5 17.5 L37.5 18.5 L39.5 16.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Middle Task Line -->
  <rect x="14" y="28" width="20" height="3" rx="1.5" fill="white" opacity="0.9"/>
  <circle cx="38" cy="29.5" r="4" fill="url(#checkGradient)"/>
  <path d="M36.5 29.5 L37.5 30.5 L39.5 28.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Bottom Task Line -->
  <rect x="14" y="40" width="20" height="3" rx="1.5" fill="white" opacity="0.9"/>
  <circle cx="38" cy="41.5" r="4" fill="white" opacity="0.3"/>
  
  <!-- Team Icon (People) -->
  <circle cx="48" cy="48" r="3.5" fill="white" opacity="0.9"/>
  <circle cx="54" cy="48" r="3.5" fill="white" opacity="0.7"/>
  <path d="M44 56 C44 53 46 51 48 51 C50 51 52 53 52 56" fill="white" opacity="0.9"/>
  <path d="M50 56 C50 53 52 51 54 51 C56 51 58 53 58 56" fill="white" opacity="0.7"/>
</svg>
